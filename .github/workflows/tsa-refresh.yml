name: Refresh TSA pane
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tsa-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - name: Update TSA pane
        env:
          TSA_CHANNEL: ${{ vars.TSA_CHANNEL }}
        run: python scripts/update_tsa_pane.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "tsa-refresh-bot"
            git config user.email "actions@github.com"
            git add index.html
            git commit -m "chore(tsa): refresh latest signal"
            git push
          else
            echo "no change"
          fi
