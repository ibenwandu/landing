<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" role="img" aria-label="Aircraft cockpit — portfolio control centre">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a6ea5"/><stop offset="1" stop-color="#16314e"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a6b2f"/><stop offset="1" stop-color="#2c401d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202329"/><stop offset="1" stop-color="#0c0e11"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6d8" stop-opacity="0.9"/><stop offset="1" stop-color="#fff6d8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="win"><path d="M30 132 L30 58 Q240 26 450 58 L450 132 Z"/></clipPath>
  </defs>

  <rect width="480" height="240" fill="#0b0d10"/>

  <!-- windscreen view -->
  <g clip-path="url(#win)">
    <rect x="30" y="26" width="420" height="80" fill="url(#sky)"/>
    <rect x="30" y="103" width="420" height="40" fill="url(#ground)"/>
    <rect x="30" y="101" width="420" height="2.5" fill="#dfe6ee" opacity="0.6"/>
    <circle cx="384" cy="56" r="26" fill="url(#sun)"/>
    <circle cx="384" cy="56" r="9" fill="#fff6d8" opacity="0.9"/>
    <ellipse cx="120" cy="62" rx="34" ry="9" fill="#cdd8e2" opacity="0.35"/>
    <ellipse cx="250" cy="48" rx="26" ry="7" fill="#cdd8e2" opacity="0.25"/>
  </g>
  <!-- window frame + posts -->
  <path d="M30 132 L30 58 Q240 26 450 58 L450 132 Z" fill="none" stroke="#3a3f47" stroke-width="4"/>
  <line x1="170" y1="41" x2="170" y2="132" stroke="#3a3f47" stroke-width="5"/>
  <line x1="312" y1="41" x2="312" y2="132" stroke="#3a3f47" stroke-width="5"/>

  <!-- glareshield -->
  <path d="M16 150 Q240 128 464 150 L464 159 Q240 138 16 159 Z" fill="#15171b"/>

  <!-- instrument panel -->
  <rect x="16" y="150" width="448" height="90" rx="8" fill="url(#panel)" stroke="#2a2f37"/>

  <!-- left six-pack gauges (2x3) -->
  <g stroke="#3a3f47" stroke-width="2" fill="#0b0d10">
    <circle cx="52" cy="176" r="13"/><circle cx="88" cy="176" r="13"/><circle cx="124" cy="176" r="13"/>
    <circle cx="52" cy="210" r="13"/><circle cx="88" cy="210" r="13"/><circle cx="124" cy="210" r="13"/>
  </g>
  <g stroke-width="2" stroke-linecap="round">
    <line x1="52" y1="176" x2="59" y2="168" stroke="#22c55e"/>
    <line x1="88" y1="176" x2="82" y2="169" stroke="#e6e8eb"/>
    <line x1="124" y1="176" x2="131" y2="171" stroke="#2563eb"/>
    <line x1="52" y1="210" x2="46" y2="203" stroke="#e6e8eb"/>
    <line x1="88" y1="210" x2="95" y2="204" stroke="#22c55e"/>
    <line x1="124" y1="210" x2="120" y2="202" stroke="#e6e8eb"/>
  </g>

  <!-- center glass MFDs -->
  <rect x="172" y="162" width="60" height="64" rx="4" fill="#0b1a2a" stroke="#2a2f37"/>
  <rect x="174" y="164" width="56" height="29" fill="#2f6aa0"/>
  <rect x="174" y="193" width="56" height="31" fill="#7a5a2a"/>
  <rect x="174" y="191" width="56" height="3" fill="#fff" opacity="0.7"/>
  <path d="M188 195 l12 0 m-6 0 l0 5" fill="none" stroke="#ffd400" stroke-width="2"/>

  <rect x="244" y="162" width="60" height="64" rx="4" fill="#0b1a2a" stroke="#2a2f37"/>
  <circle cx="274" cy="194" r="23" fill="#06121e" stroke="#2a2f37"/>
  <line x1="274" y1="194" x2="274" y2="174" stroke="#22c55e" stroke-width="2"/>
  <line x1="274" y1="194" x2="289" y2="199" stroke="#e6e8eb" stroke-width="2"/>

  <!-- right throttle quadrant -->
  <rect x="392" y="160" width="58" height="72" rx="5" fill="#15171b" stroke="#2a2f37"/>
  <rect x="404" y="178" width="8" height="42" rx="4" fill="#2a2f37"/>
  <rect x="430" y="178" width="8" height="42" rx="4" fill="#2a2f37"/>
  <circle cx="408" cy="178" r="7" fill="#9aa0a6"/>
  <circle cx="434" cy="186" r="7" fill="#9aa0a6"/>

  <!-- control yoke (foreground) -->
  <g fill="none" stroke="#c2c7cf" stroke-width="6" stroke-linecap="round">
    <path d="M214 240 q26 -30 52 0"/>
    <line x1="240" y1="221" x2="240" y2="240"/>
  </g>
  <rect x="226" y="225" width="28" height="10" rx="2" fill="#9aa0a6"/>
</svg>
