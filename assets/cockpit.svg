  <polyline points="172,90 196,78 220,84 244,60 268,72 288,50" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <polyline points="316,86 340,88 364,66 388,74 412,54 432,62" fill="none" stroke="#e6e8eb" stroke-width="2.5" opacity="0.8"/>
